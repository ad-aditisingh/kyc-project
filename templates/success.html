<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC Submitted</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f5f6fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #2d2d2d; }

        .header-banner {
            background: #1a237e;
            color: white;
            padding: 16px 0;
            margin-bottom: 40px;
            border-bottom: 3px solid #e8e8e8;
        }

        .header-banner h4 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }

        .success-wrapper {
            max-width: 560px;
            margin: 0 auto;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .success-top {
            background: #1a237e;
            padding: 32px 40px;
            text-align: center;
        }

        .check-circle {
            width: 64px;
            height: 64px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .check-circle i {
            font-size: 28px;
            color: #1a237e;
        }

        .success-top h2 {
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin: 0;
        }

        .success-top p {
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            margin: 6px 0 0;
        }

        .success-body {
            padding: 28px 40px;
            text-align: center;
        }

        .ref-box {
            background: #f8f9fc;
            border: 1px solid #e0e0e0;
            border-left: 4px solid #1a237e;
            padding: 16px 20px;
            margin: 20px 0;
            text-align: left;
        }

        .ref-box span {
            display: block;
            font-size: 12px;
            color: #757575;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .ref-box strong {
            font-size: 22px;
            color: #1a237e;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .note {
            font-size: 12.5px;
            color: #9e9e9e;
            margin-bottom: 24px;
        }

        .btn-primary-solid {
            background: #1a237e;
            color: white;
            border: none;
            padding: 10px 28px;
            font-size: 13.5px;
            font-weight: 600;
            border-radius: 3px;
            text-decoration: none;
            display: inline-block;
            margin: 4px;
            transition: background 0.2s;
        }

        .btn-primary-solid:hover {
            background: #151c6b;
            color: white;
        }

        .btn-outline-solid {
            background: white;
            color: #1a237e;
            border: 1.5px solid #1a237e;
            padding: 10px 28px;
            font-size: 13.5px;
            font-weight: 600;
            border-radius: 3px;
            text-decoration: none;
            display: inline-block;
            margin: 4px;
            transition: all 0.2s;
        }

        .btn-outline-solid:hover {
            background: #1a237e;
            color: white;
        }
    </style>
</head>
<body>

<div class="header-banner">
    <div class="container">
        <h4>ABC Fintech Solutions</h4>
    </div>
</div>

<div class="container pb-5">
    <div class="success-wrapper">
        <div class="success-top">
            <div class="check-circle">
                <i class="fas fa-check"></i>
            </div>
            <h2>Application Submitted</h2>
            <p>Your KYC application has been received and is under review.</p>
        </div>
        <div class="success-body">
            <div class="ref-box">
                <span>Reference Number</span>
                <strong>#KYC-{{ '%05d' % account_id }}</strong>
            </div>
            <p class="note">Please save this reference number for future communication with our team.</p>
            <div>
                <a href="/kyc" class="btn-primary-solid">
                    <i class="fas fa-plus me-1"></i> New Application
                </a>
                <a href="/submissions" class="btn-outline-solid">
                    <i class="fas fa-list me-1"></i> View All
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
