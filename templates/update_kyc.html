<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update KYC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f5f6fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #2d2d2d; }

        .header-banner {
            background: #1a237e;
            color: white;
            padding: 16px 0;
            margin-bottom: 28px;
            border-bottom: 3px solid #e8e8e8;
        }

        .header-banner h4 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }

        .btn-back {
            background: white;
            color: #1a237e;
            border: none;
            padding: 7px 18px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 3px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            background: #e8eaf6;
            color: #1a237e;
        }

        .form-wrapper {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .section-header {
            background: #f8f9fc;
            border-left: 4px solid #1a237e;
            border-bottom: 1px solid #e8e8e8;
            border-top: 1px solid #e8e8e8;
            padding: 10px 18px;
            font-weight: 600;
            font-size: 13px;
            color: #1a237e;
        }

        .section-header i { margin-right: 7px; font-size: 12px; }

        .section-header.locked {
            border-left-color: #9e9e9e;
            color: #757575;
        }

        .form-body { padding: 20px; }

        .form-label {
            font-weight: 500;
            color: #424242;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .form-control, .form-select {
            border: 1px solid #d0d0d0;
            border-radius: 3px;
            padding: 8px 12px;
            font-size: 13.5px;
            color: #2d2d2d;
            box-shadow: none;
        }

        .form-control:focus, .form-select:focus {
            border-color: #1a237e;
            box-shadow: 0 0 0 2px rgba(26,35,126,0.08);
            outline: none;
        }

        .readonly-field {
            background: #f5f5f5;
            color: #9e9e9e;
            cursor: not-allowed;
        }

        .submit-btn {
            background: #1a237e;
            border: none;
            padding: 10px 40px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 3px;
            color: white;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #151c6b;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
        }

        .col-md-4 {
            flex: 0 0 33.333%;
            max-width: 33.333%;
        }

        .col-md-8 {
            flex: 0 0 66.666%;
            max-width: 66.666%;
        }

        .col-md-12 {
            flex: 0 0 100%;
            max-width: 100%;
        }
    </style>
</head>
<body>

<div class="header-banner">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
        <h4>Update KYC — #KYC-{{ '%05d' % account.id }}</h4>
        <a href="/submissions" class="btn-back">
            <i class="fas fa-arrow-left me-1"></i> Back
        </a>
    </div>
</div>

<div class="container pb-5">

    <!-- Read Only Section -->
    <div class="form-wrapper">
        <div class="section-header locked">
            <i class="fas fa-lock"></i> Read-Only Fields — Cannot be changed after submission
        </div>
        <div class="form-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control readonly-field" value="{{ account.full_name }}" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Aadhaar Number</label>
                    <input type="text" class="form-control readonly-field" value="{{ account.aadhaar_number }}" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">PAN Number</label>
                    <input type="text" class="form-control readonly-field" value="{{ account.pan_number }}" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Date of Birth</label>
                    <input type="text" class="form-control readonly-field" value="{{ account.dob }}" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Gender</label>
                    <input type="text" class="form-control readonly-field" value="{{ account.gender }}" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Date of Application</label>
                    <input type="text" class="form-control readonly-field" value="{{ account.date_of_application }}" readonly>
                </div>
            </div>
        </div>
    </div>

    <!-- Editable Section -->
    <form method="POST" action="/update/{{ account.id }}">
        <div class="form-wrapper">
            <div class="section-header">
                <i class="fas fa-edit"></i> Editable Fields
            </div>
            <div class="form-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Account Type</label>
                        <select class="form-select" name="account_type">
                            <option {{ 'selected' if account.account_type == 'Savings Account' }}>Savings Account</option>
                            <option {{ 'selected' if account.account_type == 'Current Account' }}>Current Account</option>
                            <option {{ 'selected' if account.account_type == 'Loan Account' }}>Loan Account</option>
                            <option {{ 'selected' if account.account_type == 'Fixed Deposit' }}>Fixed Deposit</option>
                            <option {{ 'selected' if account.account_type == 'Recurring Deposit' }}>Recurring Deposit</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Customer Type</label>
                        <select class="form-select" name="customer_type">
                            <option {{ 'selected' if account.customer_type == 'Individual' }}>Individual</option>
                            <option {{ 'selected' if account.customer_type == 'Non-Individual' }}>Non-Individual</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Preferred Branch</label>
                        <input type="text" class="form-control" name="preferred_branch" value="{{ account.preferred_branch }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" value="{{ account.email }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Mobile</label>
                        <input type="tel" class="form-control" name="mobile" value="{{ account.mobile }}" maxlength="10">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Alternate Mobile</label>
                        <input type="tel" class="form-control" name="alternate_mobile" value="{{ account.alternate_mobile or '' }}" maxlength="10">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Employer Name</label>
                        <input type="text" class="form-control" name="employer_name" value="{{ account.employer_name or '' }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Annual Income</label>
                        <select class="form-select" name="annual_income">
                            <option {{ 'selected' if account.annual_income == 'Below ₹1 Lakh' }}>Below ₹1 Lakh</option>
                            <option {{ 'selected' if account.annual_income == '₹1 - 5 Lakhs' }}>₹1 - 5 Lakhs</option>
                            <option {{ 'selected' if account.annual_income == '₹5 - 10 Lakhs' }}>₹5 - 10 Lakhs</option>
                            <option {{ 'selected' if account.annual_income == '₹10 - 25 Lakhs' }}>₹10 - 25 Lakhs</option>
                            <option {{ 'selected' if account.annual_income == '₹25 - 50 Lakhs' }}>₹25 - 50 Lakhs</option>
                            <option {{ 'selected' if account.annual_income == 'Above ₹50 Lakhs' }}>Above ₹50 Lakhs</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Source of Funds</label>
                        <select class="form-select" name="source_of_funds">
                            <option {{ 'selected' if account.source_of_funds == 'Salary' }}>Salary</option>
                            <option {{ 'selected' if account.source_of_funds == 'Business' }}>Business</option>
                            <option {{ 'selected' if account.source_of_funds == 'Investments' }}>Investments</option>
                            <option {{ 'selected' if account.source_of_funds == 'Others' }}>Others</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-3">
            <button type="submit" class="submit-btn">
                <i class="fas fa-save me-2"></i> Save Changes
            </button>
        </div>
    </form>

</div>
</body>
</html>
